name: kind
topology:
  nodes:
    # Spine - Route Reflector
    spine:
      kind: linux
      image: quay.io/frrouting/frr:10.2.1
      binds:
        - ../frrcommon/daemons:/etc/frr/daemons
        - ../frrcommon/vtysh.conf:/etc/frr/vtysh.conf
        - spine/frr.conf:/etc/frr/frr.conf
        - spine/setup.sh:/setup.sh
      exec:
        - bash /setup.sh

    # On-prem leaf for kind cluster
    leafkind:
      kind: linux
      image: quay.io/frrouting/frr:10.2.1
      binds:
        - ../frrcommon/daemons:/etc/frr/daemons
        - ../frrcommon/vtysh.conf:/etc/frr/vtysh.conf
        - leafkind/frr.conf:/etc/frr/frr.conf

    # GCP leaf (peers with GCP workers via HA VPN and Cloud Router via BGP)
    leafgcp:
      kind: linux
      image: frr-vpn:latest
      binds:
        - ../frrcommon/daemons:/etc/frr/daemons
        - ../frrcommon/vtysh.conf:/etc/frr/vtysh.conf
        - leafgcp/frr.conf:/etc/frr/frr.conf
        - leafgcp/start-vpn.sh:/usr/local/bin/start-vpn.sh
      env:
        # VPN connection parameters
        GCP_VPN_IP: ${GCP_VPN_IP}
        ONPREM_PUBLIC_IP: ${ONPREM_PUBLIC_IP}
        SHARED_SECRET: ${SHARED_SECRET}
        # Cloud Router BGP parameters (link-local addresses)
        CLOUD_ROUTER_BGP_IP: ${CLOUD_ROUTER_BGP_IP:-169.254.0.1}
        LEAFGCP_BGP_IP: ${LEAFGCP_BGP_IP:-169.254.0.2}

    # L3VNI test leaf (peers with spine, hosts test container)
    leafl3test:
      kind: linux
      image: quay.io/frrouting/frr:10.2.1
      binds:
        - ../frrcommon/daemons:/etc/frr/daemons
        - ../frrcommon/vtysh.conf:/etc/frr/vtysh.conf
        - leafl3test/frr.conf:/etc/frr/frr.conf
        - leafl3test/setup.sh:/setup.sh
      exec:
        - bash /setup.sh

    # Test host connected to leafl3test (192.170.2.10/24)
    hostl3test:
      kind: linux
      image: "k8s.gcr.io/e2e-test-images/agnhost:2.40"
      binds:
        - hostl3test/setup.sh:/setup.sh
      cmd: netexec --http-port=8090
      exec:
        - bash /setup.sh

    # Bridge for kind cluster nodes
    leafkind-switch:
      kind: bridge

    # Kind cluster definition
    pe-kind:
      kind: k8s-kind
      startup-config: ../pe-kind-configuration-registry.yaml

    # External container references (created by kind)
    pe-kind-control-plane:
      kind: ext-container

    pe-kind-worker:
      kind: ext-container

  links:
    # Spine connections
    - endpoints: ["leafkind:eth1", "spine:eth1"]
    - endpoints: ["leafgcp:eth1", "spine:eth2"]
    - endpoints: ["leafl3test:eth1", "spine:eth3"]

    # L3VNI test leaf to host
    - endpoints: ["leafl3test:ethred", "hostl3test:eth1"]

    # leafkind to switch
    - endpoints: ["leafkind:toswitch", "leafkind-switch:leaf"]

    # Kind nodes to switch
    - endpoints: ["pe-kind-control-plane:toswitch", "leafkind-switch:kindctrl"]
    - endpoints: ["pe-kind-worker:toswitch", "leafkind-switch:kindworker"]
