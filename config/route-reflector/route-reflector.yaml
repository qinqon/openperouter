# Route Reflector ConfigMap with FRR configuration
apiVersion: v1
kind: ConfigMap
metadata:
  name: route-reflector-config
  namespace: openperouter-system
data:
  daemons: |
    bgpd=yes
    ospfd=no
    ospf6d=no
    ripd=no
    ripngd=no
    isisd=no
    pimd=no
    ldpd=no
    nhrpd=no
    eigrpd=no
    babeld=no
    sharpd=no
    pbrd=no
    bfdd=yes
    fabricd=no
    vrrpd=no
    vtysh_enable=yes
    zebra_options="  -A 127.0.0.1 -s 90000000"
    bgpd_options="   -A 127.0.0.1"
    staticd_options="-A 127.0.0.1"
    bfdd_options="   -A 127.0.0.1"
  frr.conf: |
    frr version 10.3
    frr defaults traditional
    hostname route-reflector
    log syslog informational
    service integrated-vtysh-config

    router bgp 64514
      bgp router-id 1.1.1.1
      bgp cluster-id 1.1.1.1
      no bgp ebgp-requires-policy
      no bgp default ipv4-unicast

      ! Define peer-group first
      neighbor CLIENTS peer-group
      neighbor CLIENTS remote-as 64514

      ! Accept iBGP clients dynamically from cluster pod CIDR
      bgp listen range 10.244.0.0/16 peer-group CLIENTS

      address-family l2vpn evpn
        neighbor CLIENTS activate
        neighbor CLIENTS route-reflector-client
      exit-address-family
  vtysh.conf: |
    service integrated-vtysh-config
---
# Deployment for Route Reflector pods
apiVersion: apps/v1
kind: Deployment
metadata:
  name: openperouter-rr
  namespace: openperouter-system
  labels:
    app.kubernetes.io/name: openperouter-rr
    app.kubernetes.io/component: route-reflector
spec:
  replicas: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: openperouter-rr
      app.kubernetes.io/component: route-reflector
  template:
    metadata:
      labels:
        app.kubernetes.io/name: openperouter-rr
        app.kubernetes.io/component: route-reflector
      annotations:
        kubectl.kubernetes.io/default-container: frr
    spec:
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                labelSelector:
                  matchLabels:
                    app.kubernetes.io/name: openperouter-rr
                    app.kubernetes.io/component: route-reflector
                topologyKey: kubernetes.io/hostname
      initContainers:
        - name: cp-frr-files
          image: quay.io/frrouting/frr:10.3.1
          imagePullPolicy: IfNotPresent
          command: ["/bin/sh", "-c", "cp -rLf /tmp/frr/* /etc/frr/"]
          volumeMounts:
            - name: frr-startup
              mountPath: /tmp/frr
            - name: frrconfig
              mountPath: /etc/frr
      containers:
        - name: frr
          image: quay.io/frrouting/frr:10.3.1
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 179
              name: bgp
              protocol: TCP
          securityContext:
            capabilities:
              add:
                - NET_ADMIN
                - NET_RAW
                - NET_BIND_SERVICE
                - SYS_ADMIN
          volumeMounts:
            - name: frrconfig
              mountPath: /etc/frr
            - name: frr-sockets
              mountPath: /var/run/frr
          command:
            - /bin/sh
            - -c
            - |
              /usr/lib/frr/docker-start &
              FRR_PID=$!
              sleep 5
              wait $FRR_PID
          livenessProbe:
            exec:
              command:
                - vtysh
                - -c
                - show bgp summary
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 5
          readinessProbe:
            tcpSocket:
              port: 179
            initialDelaySeconds: 5
            periodSeconds: 5
          resources:
            limits:
              cpu: 500m
              memory: 256Mi
            requests:
              cpu: 100m
              memory: 128Mi
      volumes:
        - name: frr-startup
          configMap:
            name: route-reflector-config
        - name: frrconfig
          emptyDir: {}
        - name: frr-sockets
          emptyDir: {}
      terminationGracePeriodSeconds: 10
