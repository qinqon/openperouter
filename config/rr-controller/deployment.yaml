apiVersion: apps/v1
kind: Deployment
metadata:
  name: rr-controller
  namespace: system
  labels:
    app.kubernetes.io/name: rr-controller
    app.kubernetes.io/component: rr-controller
    app.kubernetes.io/part-of: openperouter
    app.kubernetes.io/managed-by: kustomize
spec:
  replicas: 2
  selector:
    matchLabels:
      app: openperouter-rr-controller
  template:
    metadata:
      labels:
        app: openperouter-rr-controller
    spec:
      serviceAccountName: rr-controller
      terminationGracePeriodSeconds: 30
      containers:
      - name: rr-controller
        image: router:latest
        imagePullPolicy: IfNotPresent
        command: ["/rrcontroller"]
        args:
        - "--nodename=$(NODE_NAME)"
        - "--namespace=$(NAMESPACE)"
        - "--loglevel=debug"
        - "--health-probe-bind-address=:9082"
        env:
        - name: NODE_NAME
          valueFrom:
            fieldRef:
              fieldPath: spec.nodeName
        - name: NAMESPACE
          valueFrom:
            fieldRef:
              fieldPath: metadata.namespace
        ports:
        - containerPort: 9082
          name: health
          protocol: TCP
        readinessProbe:
          httpGet:
            path: /readyz
            port: 9082
          initialDelaySeconds: 5
          periodSeconds: 10
          timeoutSeconds: 1
          failureThreshold: 3
        livenessProbe:
          httpGet:
            path: /healthz
            port: 9082
          initialDelaySeconds: 15
          periodSeconds: 20
          timeoutSeconds: 1
          failureThreshold: 3
        resources:
          limits:
            cpu: 100m
            memory: 64Mi
          requests:
            cpu: 10m
            memory: 32Mi
      affinity:
        # Ensure RR controller pods land on nodes that run router pods.
        podAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
          - labelSelector:
              matchLabels:
                app: router
            topologyKey: kubernetes.io/hostname
        # Ensure the two replicas land on different nodes for HA.
        podAntiAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
          - labelSelector:
              matchLabels:
                app: openperouter-rr-controller
            topologyKey: kubernetes.io/hostname
      tolerations:
      - effect: NoSchedule
        key: node-role.kubernetes.io/master
        operator: Exists
      - effect: NoSchedule
        key: node-role.kubernetes.io/control-plane
        operator: Exists
