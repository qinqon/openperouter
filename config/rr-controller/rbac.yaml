---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: rr-controller
  namespace: system
  labels:
    app.kubernetes.io/name: rr-controller
    app.kubernetes.io/managed-by: kustomize
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: rr-controller-role
  labels:
    app.kubernetes.io/name: rr-controller
    app.kubernetes.io/managed-by: kustomize
rules:
- apiGroups: [""]
  resources: [nodes]
  verbs: [get, list, watch, update, patch]
- apiGroups: [openpe.openperouter.github.io]
  resources: [underlays]
  verbs: [get, list, watch]
- apiGroups: [openpe.openperouter.github.io]
  resources: [rawfrrconfigs]
  verbs: [get, list, watch, create, update, patch, delete]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: rr-controller-rolebinding
  labels:
    app.kubernetes.io/name: rr-controller
    app.kubernetes.io/managed-by: kustomize
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: rr-controller-role
subjects:
- kind: ServiceAccount
  name: rr-controller
  namespace: system
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: rr-controller-node-finalizer
  labels:
    app.kubernetes.io/name: rr-controller
    app.kubernetes.io/managed-by: kustomize
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: rr-controller-role
subjects:
- kind: ServiceAccount
  name: rr-controller
  namespace: system
