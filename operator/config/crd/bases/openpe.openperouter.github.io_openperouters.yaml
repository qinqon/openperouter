---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  annotations:
    controller-gen.kubebuilder.io/version: v0.19.0
  name: openperouters.openpe.openperouter.github.io
spec:
  group: openpe.openperouter.github.io
  names:
    kind: OpenPERouter
    listKind: OpenPERouterList
    plural: openperouters
    singular: openperouter
  scope: Namespaced
  versions:
  - name: v1alpha1
    schema:
      openAPIV3Schema:
        description: OpenPERouter is the Schema for the openperouters API
        properties:
          apiVersion:
            description: |-
              APIVersion defines the versioned schema of this representation of an object.
              Servers should convert recognized schemas to the latest internal value, and
              may reject unrecognized values.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
            type: string
          kind:
            description: |-
              Kind is a string value representing the REST resource this object represents.
              Servers may infer this from the endpoint the client submits requests to.
              Cannot be updated.
              In CamelCase.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            type: string
          metadata:
            type: object
          spec:
            description: OpenPERouterSpec defines the desired state of OpenPERouter
            properties:
              healthProbePort:
                default: 9081
                description: 'HealthProbePort specifies the port for the controller''s
                  health and readiness probes. (default: 9081)'
                maximum: 65535
                minimum: 1
                type: integer
              logLevel:
                description: |-
                  Define the verbosity of the controller and the router logging.
                  Allowed values are: all, debug, info, warn, error, none. (default: info)
                enum:
                - all
                - debug
                - info
                - warn
                - error
                - none
                type: string
              multusNetworkAnnotation:
                description: MultusNetworkAnnotation specifies the Multus network
                  annotation to be added to the router pod.
                type: string
              ovsRunDir:
                description: 'OVSRunDir specifies the OVS run directory to mount.
                  This is the directory containing the OVS socket. (default: /var/run/openvswitch)'
                type: string
              ovsSocketPath:
                description: OVSSocketPath specifies the OVS database socket path.
                  Defaults to standard OVS location if not specified.
                type: string
              routeReflector:
                description: |-
                  RouteReflector configures the internal iBGP route reflector deployment.
                  When enabled, deploys a 2-replica RR controller that configures two router pods
                  as iBGP route reflectors for EVPN East/West distribution.
                properties:
                  enabled:
                    default: false
                    description: |-
                      Enabled deploys the RR controller Deployment which configures two router pods
                      as iBGP route reflectors for EVPN East/West distribution.
                    type: boolean
                  replicas:
                    default: 2
                    description: Replicas is the number of RR controller replicas
                      (= number of RR nodes).
                    minimum: 1
                    type: integer
                type: object
              runOnMaster:
                default: true
                description: 'RunOnMaster determines if all pods (router, controller,
                  and nodemarker) will run on master/control-plane nodes. (default:
                  true)'
                type: boolean
            type: object
          status:
